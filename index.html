      function renderCacheEntry(item) {
        const label = `${item.season}·第${item.episode}集`;
        return `
          <button class="cache-link" data-action="open-cache-entry" data-cache-key="${escapeAttribute(item.key)}">
            <span class="cache-link-title">${escapeHTML(label)}</span>
            <span class="cache-link-meta">模式：${escapeHTML(getModeLabel(item.mode))} · 模型：${escapeHTML(item.requestedModel || "未记录")} · 生成时间：${escapeHTML(formatDateTime(item.createdAt || 0))}</span>
          </button>
        `;
      }

      function handleClick(event) {
        const target = event.target.closest("[data-action]");
        if (!target) {
          return;
        }

        const action = target.dataset.action;

        if (action === "copy-module" || action === "copy-all" || action === "copy-fallback" || action === "copy-analysis") {
          event.stopPropagation();
        }

        switch (action) {
          case "switch-tab":
            state.activeTab = target.dataset.tab;
            render();
            break;
          case "select-season":
            selectSeason(Number(target.dataset.seasonIndex));
            break;
          case "select-episode":
            selectEpisode(Number(target.dataset.seasonIndex), Number(target.dataset.episodeNum));
            break;
          case "continue-last":
            jumpToRecentEpisode();
            break;
          case "jump-latest":
            jumpToEpisode(Number(target.dataset.seasonIndex), Number(target.dataset.episodeNum));
            break;
          case "jump-adjacent":
            jumpAdjacentEpisode(Number(target.dataset.offset));
            break;
          case "close-panel":
            closePanel();
            break;
          case "generate":
          case "regenerate":
            generateAnalysis();
            break;
          case "view-cache":
            showCacheResult();
            break;
          case "cancel-request":
            abortCurrentRequest("用户已取消本次生成。");
            state.loading = false;
            stopLoadingTicker();
            render();
            pushToast("已取消当前解析生成。", "success");
            break;
          case "toggle-module":
            toggleModule(target.dataset.moduleId);
            break;
          case "copy-all":
            {
              const activeEssay = getActiveEssayResult();
              copyText(activeEssay ? activeEssay.text : "", "全部解析已复制。");
            }
            break;
          case "copy-module":
            copyModule(target.dataset.moduleId);
            break;
          case "jump-module":
            jumpToModule(target.dataset.moduleId);
            break;
          case "expand-all":
            setAllModulesOpen(true);
            break;
          case "collapse-all":
            setAllModulesOpen(false);
            break;
          case "set-episode-filter":
            setEpisodeFilter(target.dataset.filter);
            break;
          case "clear-episode-query":
            updateEpisodeQuery("");
            break;
          case "reset-episode-filters":
            resetEpisodeFilters();
            break;
          case "set-reading-scale":
            setReadingScale(target.dataset.scale);
            break;
          case "copy-fallback":
            copyText(state.result && state.result.rawText ? state.result.rawText : "", "原始返回已复制。");
            break;
          case "copy-analysis":
            {
              const activeEssay = getActiveEssayResult();
              copyText(activeEssay ? activeEssay.text : "", "全文解析已复制。");
            }
            break;
          case "toggle-visibility":
            state.revealedFields[target.dataset.target] = !state.revealedFields[target.dataset.target];
            render();
            break;
          case "save-openrouter":
            saveKey(STORAGE_KEYS.apiKey, document.getElementById("openrouterKey").value.trim(), "OpenRouter Key 已保存。");
            break;
          case "save-deepseek":
            saveKey(STORAGE_KEYS.deepseekKey, document.getElementById("deepseekKey").value.trim(), "DeepSeek 备用 Key 已保存。");
            break;
          case "test-openrouter":
            testOpenRouter();
            break;
          case "test-deepseek":
            testDeepSeek();
            break;
          case "save-model":
            saveModel();
            break;
          case "set-mode":
            setMode(target.dataset.mode);
            break;
          case "clear-current-cache":
            clearCurrentCache();
            break;
          case "clear-all-cache":
            clearAllCache();
            break;
          case "open-cache-entry":
            openCacheEntry(target.dataset.cacheKey);
            break;
          default:
            break;
        }
      }

      function handleInput(event) {
        const target = event.target;
        if (!target) {
          return;
        }
        if (target.id === "episodeSearch") {
          if (event.isComposing) {
            return;
          }
          updateEpisodeQuery(target.value, typeof target.selectionStart === "number" ? target.selectionStart : null);
        }
      }

      function handleKeydown(event) {
        if (state.activeTab !== "main") {
          return;
        }

        const typing = isTypingContext(event.target);
        if (!typing && event.key === "Escape" && state.selectedEpisodeNum) {
          event.preventDefault();
          closePanel();
          return;
        }

        if (!typing && state.selectedEpisodeNum && (event.key === "ArrowLeft" || event.key === "ArrowRight")) {
          event.preventDefault();
          jumpAdjacentEpisode(event.key === "ArrowLeft" ? -1 : 1);
          return;
        }

        if (!typing && (event.ctrlKey || event.metaKey) && event.key === "Enter" && state.selectedEpisodeNum) {
          event.preventDefault();
          generateAnalysis();
        }
      }

      function selectSeason(index) {
        if (index === state.selectedSeasonIndex) {
          return;
        }
        abortCurrentRequest();
        stopLoadingTicker();
        if (state.episodeFilter === "current_arc") {
          state.episodeFilter = "all";
        }
        state.selectedSeasonIndex = index;
        state.selectedEpisodeNum = null;
        state.loading = false;
        state.result = null;
        render();
      }

      function jumpToEpisode(seasonIndex, episodeNum) {
        if (Number.isNaN(seasonIndex) || Number.isNaN(episodeNum)) {
          return;
        }
        state.activeTab = "main";
        selectEpisode(seasonIndex, episodeNum);
      }

      function closePanel() {
        if (state.loading) {
          abortCurrentRequest("已关闭侧边阅读面板，并中止当前生成。");
          state.loading = false;
          stopLoadingTicker();
        }
        if (state.episodeFilter === "current_arc") {
          state.episodeFilter = "all";
        }
        state.selectedEpisodeNum = null;
        state.result = null;
        render();
      }

      function selectEpisode(seasonIndex, episodeNum) {
        abortCurrentRequest();
        stopLoadingTicker();
        state.activeTab = "main";
        state.selectedSeasonIndex = seasonIndex;
        state.selectedEpisodeNum = episodeNum;
        state.loading = false;
        state.result = null;
        persistLastEpisode();
        const cache = getCurrentCache();
        if (cache) {
          setResult(cacheToResult(cache, true));
        }
        render();
      }

      function jumpToRecentEpisode() {
        const recent = safeStorage.getJSON(STORAGE_KEYS.lastEpisode, null);
        if (!recent) {
          pushToast("还没有可继续查看的记录。", "error");
          return;
        }
        const seasonIndex = EPISODE_DATA.seasons.findIndex((season) => season.name === recent.seasonName);
        if (seasonIndex === -1) {
          pushToast("上次查看的剧集不在当前元数据中。", "error");
          return;
        }
        state.activeTab = "main";
        selectEpisode(seasonIndex, recent.episodeNum);
      }

      function jumpAdjacentEpisode(offset) {
        if (!state.selectedEpisodeNum || !offset) {
          return;
        }
        const adjacent = getAdjacentEpisodes(state.selectedSeasonIndex, state.selectedEpisodeNum);
        const nextSelection = offset < 0 ? adjacent.prev : adjacent.next;
        if (!nextSelection) {
          pushToast(offset < 0 ? "已经是当前收录的第一集了。" : "已经是当前收录的最新一集了。", "error");
          return;
        }
        jumpToEpisode(nextSelection.seasonIndex, nextSelection.num);
      }

      function setEpisodeFilter(filter) {
        if (!EPISODE_FILTERS.some((item) => item.id === filter)) {
          return;
        }
        if (filter === "current_arc" && !getCurrentArcFilterMeta(EPISODE_DATA.seasons[state.selectedSeasonIndex])) {
          return;
        }
        state.episodeFilter = filter;
        render();
      }

      function resetEpisodeFilters() {
        state.episodeFilter = "all";
        updateEpisodeQuery("");
      }

      function updateEpisodeQuery(value, cursorPosition = null) {
        state.episodeQuery = String(value || "");
        render();
        window.requestAnimationFrame(() => {
          const input = document.getElementById("episodeSearch");
          if (!input) {
            return;
          }
          input.focus();
          const pos = cursorPosition == null ? input.value.length : Math.min(cursorPosition, input.value.length);
          input.setSelectionRange(pos, pos);
        });
      }

      async function generateAnalysis() {
        if (!state.selectedEpisodeNum || state.loading) {
          return;
        }

        const openRouterKey = readSetting(STORAGE_KEYS.apiKey, "").trim();
        const deepseekKey = readSetting(STORAGE_KEYS.deepseekKey, "").trim();
        if (!openRouterKey && !deepseekKey) {
          setResult({
            kind: "error",
            message: "请先在设置页填写 OpenRouter API Key；如果暂时没有，也可以先填写 DeepSeek 备用 Key。"
          });
          render();
          return;
        }

        if (openRouterKey && !/^sk-or-/i.test(openRouterKey)) {
          setResult({
            kind: "error",
            message: "OpenRouter Key 格式看起来不对，请填写以 sk-or- 开头的 Key。"
          });
          render();
          return;
        }

        state.loading = true;
        state.result = null;
        state.feedback.settings = "";
        state.feedback.settingsType = "";
        startLoadingTicker();
        render();

        const controller = new AbortController();
        state.activeController = controller;
        const token = ++state.requestToken;
        controller.timeoutHandle = window.setTimeout(() => {
          controller.wasTimeout = true;
          controller.abort();
        }, CONFIG.requestTimeoutMs);

        try {
          const selection = getCurrentSelection();
          const requestedModel = state.currentModel;
          const generated = await fetchAnalysis(selection, requestedModel, controller);
          if (token !== state.requestToken) {
            return;
          }

          if (generated.kind === "essay") {
            saveCache(generated.cacheEntry);
          }

          setResult(generated.result);
        } catch (error) {
          if (token !== state.requestToken) {
            return;
          }
          setResult({
            kind: "error",
            message: humanizeError(error)
          });
        } finally {
          window.clearTimeout(controller.timeoutHandle);
          if (state.activeController === controller) {
            state.activeController = null;
          }
          stopLoadingTicker();
          state.loading = false;
          render();
        }
      }

      async function fetchAnalysis(selection, requestedModel, controller) {
        const modeMeta = MODE_OPTIONS.find((item) => item.id === state.currentMode) || MODE_OPTIONS[1];
        const adjacent = getAdjacentEpisodes(selection.seasonIndex, selection.episodeNum);
        const userPrompt = `请为《剑来》动画 ${selection.seasonName} 第${selection.episodeNum}集《${selection.shortTitle}》生成一篇从头到尾能顺着读下去的完整剧情解析。

当前用户模式：${modeMeta.label}

本地已知剧集信息：
- 本集标题：${selection.shortTitle}
- 所属篇章：${selection.arc || "未标注"}
- 当前季主题：${selection.seasonTheme || selection.seasonName}
- 本集重点人物：${selection.tags.length ? selection.tags.join("、") : "未标注"}
- 本集题眼：${selection.focus || "优先解释本集的重要因果"}
- 上一集：${adjacent.prev ? adjacent.prev.fullTitle : "无"}
- 下一集：${adjacent.next ? adjacent.next.fullTitle : "暂无后续已播集数"}

当前模式写作侧重：
${modeMeta.promptFocus.map((line, index) => `${index + 1}. ${line}`).join("\n")}

要求：
1. 正文必须像一篇给普通观众看的长解析，直接自然分段，不要拆很多模块标题，不要列答题卡。
2. 开头先讲清本集发生了什么、核心冲突是什么，中间顺着剧情把人物动机、前情因果、设定解释和容易看漏的地方揉进去。
3. 如果你能确认某些内容属于本集动画直接呈现，请按确定语气写。
4. 如果有些解释来自原著补充或合理推断，也要自然写进正文里，不要写成“字段备注”或程序文档口吻。
5. 直接输出正文，不要包 JSON，不要带 markdown 代码块，不要额外解释“下面开始解析”之类的套话。

如果你对这一集动画的具体改编内容无法完全确认，可以基于原著对应章节与动画整体进度进行合理推断，但也要用观众能读下去的自然表达来写。`;

        const baseMessages = [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userPrompt }
        ];

        let rawText = "";
        let channel = "";
        let usedModel = "";
        let notice = null;
        const openRouterKey = readSetting(STORAGE_KEYS.apiKey, "").trim();
        const deepseekKey = readSetting(STORAGE_KEYS.deepseekKey, "").trim();

        if (openRouterKey) {
          try {
            rawText = await requestOpenRouter(openRouterKey, requestedModel, baseMessages, controller);
            channel = "OpenRouter";
            usedModel = requestedModel;
          } catch (error) {
            if (isAbortLike(error)) {
              throw error;
            }
            if (shouldRetryWithOpenRouterAuto(requestedModel, error)) {
              try {
                rawText = await requestOpenRouter(openRouterKey, "openrouter/auto", baseMessages, controller);
                channel = "OpenRouter";
                usedModel = "openrouter/auto";
                notice = {
                  type: "warning",
                  message: `当前所选模型 ${requestedModel} 在 OpenRouter 当前不可用，已自动切换为 openrouter/auto 继续生成。`
                };
              } catch (autoError) {
                if (isAbortLike(autoError)) {
                  throw autoError;
                }
                if (deepseekKey) {
                  notice = {
                    type: "warning",
                    message: `当前所选模型 ${requestedModel} 不可用，且 openrouter/auto 也未成功，已自动切换至 DeepSeek 备用通道。`
                  };
                  rawText = await requestDeepSeek(deepseekKey, baseMessages, controller);
                  channel = "DeepSeek 备用";
                  usedModel = "deepseek-chat";
                } else {
                  throw autoError;
                }
              }
            } else if (deepseekKey) {
              notice = {
                type: "warning",
                message: "OpenRouter 调用失败，已自动切换至 DeepSeek 备用通道。"
              };
              rawText = await requestDeepSeek(deepseekKey, baseMessages, controller);
              channel = "DeepSeek 备用";
              usedModel = "deepseek-chat";
            } else {
              throw error;
            }
          }
        } else if (deepseekKey) {
          notice = {
            type: "warning",
            message: "未配置 OpenRouter，已直接使用 DeepSeek 备用通道。"
          };
          rawText = await requestDeepSeek(deepseekKey, baseMessages, controller);
          channel = "DeepSeek 备用";
          usedModel = "deepseek-chat";
        }

        const analysisText = buildAnalysisTextFromResponse(rawText);
        if (!analysisText) {
          return {
            kind: "error",
            result: {
              kind: "error",
              message: "这次拿到了返回，但没能整理成可读正文，请重新生成一次。"
            }
          };
        }

        const cacheEntry = {
          version: CONFIG.cacheVersion,
          season: selection.seasonName,
          episode: selection.episodeNum,
          shortTitle: selection.shortTitle,
          mode: state.currentMode,
          model: usedModel,
          requestedModel,
          promptVersion: CONFIG.promptVersion,
          createdAt: Date.now(),
          channel,
          text: analysisText,
          rawText
        };

        return {
          kind: "essay",
          cacheEntry,
          result: cacheToResult(cacheEntry, false, notice)
        };
      }

      async function requestOpenRouter(apiKey, model, messages, controller, options = {}) {
        let response;
        try {
          const body = {
            model,
            messages,
            temperature: 0.65
          };
          if (options.responseJson) {
            body.response_format = { type: "json_object" };
          }
          response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`
            },
            body: JSON.stringify(body),
            signal: controller.signal
          });
        } catch (error) {
          if (controller.wasTimeout) {
            const timeoutError = new Error("请求超时，本次解析内容较长，建议稍后重试。");
            timeoutError.wasTimeout = true;
            timeoutError.name = "AbortError";
            throw timeoutError;
          }
          throw error;
        }

        const text = await response.text();
        if (!response.ok) {
          throw new Error(resolveApiError("OpenRouter", response.status, text));
        }

        return pickContentFromResponse(text);
      }

          navigator.clipboard.writeText(text).then(() => {

            fallbackCopy(text, successMessage);
          });
          return;

        fallbackCopy(text, successMessage);

      function fallbackCopy(text, successMessage) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand("copy");
          pushToast(successMessage, "success");
        } catch (error) {
          pushToast("复制失败，请手动选择内容复制。", "error");

        if (cache.mode !== state.currentMode) {

      function cleanAndParseJson(rawText) {
        if (!rawText) {
          return { ok: false, error: "empty" };
        }

        let cleaned = normalizeRawJsonText(rawText);
        const extracted = extractFirstJsonObject(cleaned);
        if (extracted) {
          cleaned = extracted;
        }
        const candidates = [
          cleaned,
          cleaned.replace(/,\s*([}\]])/g, "$1"),
          repairJsonLikeText(cleaned),
          repairJsonLikeText(cleaned.replace(/,\s*([}\]])/g, "$1"))
        ];

        let lastError = null;
        const tried = new Set();
        for (const candidate of candidates) {
          if (!candidate || tried.has(candidate)) {
            continue;
          }
          tried.add(candidate);
          try {
            return { ok: true, data: JSON.parse(candidate) };
          } catch (error) {
            lastError = error;
          }
        }

        return { ok: false, error: lastError ? lastError.message : "parse_failed" };
      }

      function normalizeRawJsonText(rawText) {
        return String(rawText || "")
          .trim()
          .replace(/```json/gi, "```")
          .replace(/```/g, "")
          .replace(/[“”]/g, "\"")
          .replace(/[‘’]/g, "'")
          .replace(/\u00A0/g, " ")
          .trim();
      }

      function repairJsonLikeText(text) {
        let result = "";
        let inString = false;
        let escaped = false;

        for (let i = 0; i < text.length; i += 1) {
          const char = text[i];

          if (inString) {
            if (escaped) {
              if (!/["\\/bfnrtu]/.test(char)) {
                result += "\\";
              }
              result += char;
              escaped = false;
              continue;
            }

            if (char === "\\") {
              result += char;
              escaped = true;
              continue;
            }
            if (char === "\"") {
              result += char;
              inString = false;
              continue;
            }
            if (char === "\n") {
              result += "\\n";
              continue;
            }
            if (char === "\r") {
              continue;
            }
            if (char === "\t") {
              result += "\\t";
              continue;
            }
            if (char < " ") {
              continue;
            }
            result += char;
            continue;
          }

          if (char === "\"") {
            inString = true;
            result += char;
            continue;
          }
          if (char === "\uFEFF") {
            continue;
          }
          result += char;
        }

        return result.replace(/,\s*([}\]])/g, "$1");
      }

      function extractFirstJsonObject(text) {
        const start = text.indexOf("{");
        if (start === -1) {
          return "";
        }
        let depth = 0;
        let inString = false;
        let escaped = false;
        for (let i = start; i < text.length; i += 1) {
          const char = text[i];
          if (inString) {
            if (escaped) {
              escaped = false;
            } else if (char === "\\") {
              escaped = true;
            } else if (char === "\"") {
              inString = false;
            }
            continue;
          }
          if (char === "\"") {
            inString = true;
            continue;
          }
          if (char === "{") {
            depth += 1;
          }
          if (char === "}") {
            depth -= 1;
            if (depth === 0) {
              return text.slice(start, i + 1);
            }
          }
        }
        return "";
      }

      function buildAnalysisTextFromResponse(rawText) {
        const cleaned = normalizeEssayText(normalizeRawJsonText(rawText));
        const parsed = cleanAndParseJson(rawText);
        if (parsed.ok) {
          const direct = normalizeEssayText(pickText(parsed.data?.analysis, ""));
          if (direct) {
            return direct;
          }
          const rebuilt = normalizeEssayText(buildEssayFromLegacyStructuredData(parsed.data));
          if (rebuilt) {
            return rebuilt;
          }
        }
        const looseAnalysis = normalizeEssayText(extractLooseStringField(cleaned, "analysis"));
        if (looseAnalysis) {
          return looseAnalysis;
        }
        const digestText = normalizeEssayText(buildReaderFallbackText(rawText));
        if (digestText) {
          return digestText;
        }
        if (cleaned.startsWith("{") || cleaned.startsWith("[")) {
          return "";
        }
        return cleaned;
      }

      function normalizeEssayText(text) {
        return String(text || "")
          .replace(/\r/g, "")
          .replace(/\n{3,}/g, "\n\n")
          .replace(/[ \t]+\n/g, "\n")
          .trim();
      }

      function buildReaderFallbackText(rawText) {
        const digest = buildReaderFallback(rawText);
        if (!digest || !digest.sections || !digest.sections.length) {
          return "";
        }
        return digest.sections.map((section) => {
          const chunks = [];
          if (section.body) {
            chunks.push(section.body);
          }
          if (section.items && section.items.length) {
            chunks.push(section.items.join(" "));
          }
          return chunks.join(" ");
        }).filter(Boolean).join("\n\n");
      }

      function buildEssayFromLegacyStructuredData(data) {
        if (!data || typeof data !== "object") {
          return "";
        }

        const parts = [];
        const summaryText = pickText(data?.summary?.text, "");
        if (summaryText) {
          parts.push(summaryText);
        }

        const sceneLines = normalizeArray(data?.scenes)
          .slice(0, 5)
          .map((item) => {
            const title = pickText(item?.title, "");
            const description = pickText(item?.description, "");
            const significance = pickText(item?.significance, "");
            return [title ? `${title}这场戏里，` : "", description, significance ? `这一段真正重要的地方在于${significance}` : ""]
              .filter(Boolean)
              .join("");
          })
          .filter(Boolean);
        if (sceneLines.length) {
          parts.push(`顺着剧情往下看，${sceneLines.join("。")}${sceneLines.length ? "。" : ""}`);
        }

        const conflictLines = normalizeArray(data?.coreConflict)
          .slice(0, 3)
          .map((item) => pickText(item?.point, ""))
          .filter(Boolean);
        if (conflictLines.length) {
          parts.push(`这一集真正牵动局势的地方，主要在于${conflictLines.join("；")}。`);
        }

        const confusingLines = normalizeArray(data?.confusingPoints)
          .slice(0, 3)
          .map((item) => {
            const question = pickText(item?.question, "");
            const answer = pickText(item?.answer, "");
            if (!question && !answer) {
              return "";
            }
            return question ? `${question}${answer ? `，其实是因为${answer}` : ""}` : answer;
          })
          .filter(Boolean);
        if (confusingLines.length) {
          parts.push(`如果你觉得有些地方一闪而过，最容易看漏的通常是这些：${confusingLines.join("；")}。`);
        }

        const characterLines = normalizeArray(data?.characters)
          .slice(0, 4)
          .map((item) => {
            const name = pickText(item?.name, "");
            const identity = pickText(item?.identity, "");
            const episodeText = pickText(item?.thisEpisode, "");
            const relation = pickText(item?.relationChanges, "");
            if (!name) {
              return "";
            }
            return `${name}${identity ? `本身是${identity}` : ""}，这集里${episodeText || "戏份变化明显"}${relation ? `，关系上也出现了${relation}` : ""}`;
          })
          .filter(Boolean);
        if (characterLines.length) {
          parts.push(`人物层面也值得留意：${characterLines.join("；")}。`);
        }

        const highlightLines = normalizeArray(data?.highlights)
          .slice(0, 2)
          .map((item) => {
            const quote = pickText(item?.quote, "");
            const deeperMeaning = pickText(item?.deeperMeaning, "");
            if (!quote) {
              return "";
            }
            return deeperMeaning ? `${quote}，这句话背后其实在讲${deeperMeaning}` : quote;
          })
          .filter(Boolean);
        if (highlightLines.length) {
          parts.push(`如果要抓这一集最有味道的瞬间，可以记住${highlightLines.join("；")}。`);
        }

        const spoilerParts = [];
        const futureDirection = pickText(data?.spoilers?.futureDirection?.text, "");
        const characterFates = pickText(data?.spoilers?.characterFates?.text, "");
        const adaptationDifferences = pickText(data?.spoilers?.adaptationDifferences?.text, "");
        if (futureDirection) {
          spoilerParts.push(`按原著线往后看，${futureDirection}`);
        }
        if (characterFates) {
          spoilerParts.push(`人物后手方面，${characterFates}`);
        }
        if (adaptationDifferences) {
          spoilerParts.push(`改编上还要注意，${adaptationDifferences}`);
        }
        if (spoilerParts.length) {
          parts.push(spoilerParts.join("。") + "。");
        }

        return parts.join("\n\n");
      }

      function buildReaderFallback(rawText) {
        const cleaned = normalizeRawJsonText(rawText);
        const sections = [];
        const summaryBlock = extractNamedBlock(cleaned, "summary", "{", "}");
        const summaryText = extractLooseStringField(summaryBlock, "text");
        const originalChapters = extractLooseStringField(summaryBlock, "originalChapters");
        if (summaryText) {
          sections.push({
            title: "自动抢救出的本集概要",
            body: summaryText,
            meta: originalChapters ? `对应原著：${originalChapters}` : ""
          });
        }

        const conflictItems = extractItemsFromArray(cleaned, "coreConflict", (block) => extractLooseStringField(block, "point"), 4);
        if (conflictItems.length) {
          sections.push({
            title: "还能读出来的核心矛盾",
            items: conflictItems
          });
        }

        const confusingItems = extractItemsFromArray(cleaned, "confusingPoints", (block) => {
          const question = extractLooseStringField(block, "question");
          const answer = extractLooseStringField(block, "answer");
          if (!question && !answer) {
            return "";
          }
          return question && answer ? `${question}：${answer}` : question || answer;
        }, 3);
        if (confusingItems.length) {
          sections.push({
            title: "还能抢救出的疑点解释",
            items: confusingItems
          });
        }

        const highlightItems = extractItemsFromArray(cleaned, "highlights", (block) => extractLooseStringField(block, "quote"), 3);
        if (highlightItems.length) {
          sections.push({
            title: "还能读出来的名场面 / 金句",
            items: highlightItems
          });
        }

        return sections.length ? { sections } : null;
      }

      function extractNamedBlock(text, key, opener, closer) {
        if (!text || !key) {
          return "";
        }
        const keyPattern = new RegExp(`"${escapeRegExp(key)}"\\s*:\\s*\\${opener}`);
        const match = keyPattern.exec(text);
        if (!match) {
          return "";
        }
        const start = text.indexOf(opener, match.index);
        return start === -1 ? "" : extractBalancedBlock(text, start, opener, closer);
      }

      function extractBalancedBlock(text, startIndex, opener, closer) {
        let depth = 0;
        let inString = false;
        let escaped = false;

        for (let i = startIndex; i < text.length; i += 1) {
          const char = text[i];
          if (inString) {
            if (escaped) {
              escaped = false;
            } else if (char === "\\") {
              escaped = true;
            } else if (char === "\"") {
              inString = false;
            }
            continue;
          }
          if (char === "\"") {
            inString = true;
            continue;
          }
          if (char === opener) {
            depth += 1;
          } else if (char === closer) {
            depth -= 1;
            if (depth === 0) {
              return text.slice(startIndex, i + 1);
            }
          }
        }
        return text.slice(startIndex);
      }

      function extractItemsFromArray(text, key, mapper, limit = 3) {
        const arrayText = extractNamedBlock(text, key, "[", "]");
        if (!arrayText) {
          return [];
        }
        const objectBlocks = extractTopLevelObjects(arrayText, limit);
        return objectBlocks.map((block) => mapper(block)).filter(Boolean);
      }

      function extractTopLevelObjects(arrayText, limit = 3) {
        const items = [];
        let inString = false;
        let escaped = false;
        let arrayDepth = 0;

        for (let i = 0; i < arrayText.length; i += 1) {
          const char = arrayText[i];
          if (inString) {
            if (escaped) {
              escaped = false;
            } else if (char === "\\") {
              escaped = true;
            } else if (char === "\"") {
              inString = false;
            }
            continue;
          }
          if (char === "\"") {
            inString = true;
            continue;
          }
          if (char === "[") {
            arrayDepth += 1;
            continue;
          }
          if (char === "]") {
            arrayDepth -= 1;
            continue;
          }
          if (char === "{" && arrayDepth === 1) {
            const block = extractBalancedBlock(arrayText, i, "{", "}");
            items.push(block);
            i += Math.max(block.length - 1, 0);
            if (items.length >= limit) {
              break;
            }
          }
        }

        return items;
      }

      function extractLooseStringField(text, key) {
        if (!text || !key) {
          return "";
        }
        const pattern = new RegExp(`"${escapeRegExp(key)}"\\s*:\\s*"((?:\\\\.|[^"\\\\])*)"`);
        const match = pattern.exec(text);
        return match ? decodeLooseString(match[1]) : "";
      }

      function decodeLooseString(value) {
        return String(value || "")
          .replace(/\\u([\da-fA-F]{4})/g, (_, code) => String.fromCharCode(parseInt(code, 16)))
          .replace(/\\n/g, "\n")
          .replace(/\\r/g, "")
          .replace(/\\t/g, " ")
          .replace(/\\"/g, "\"")
          .replace(/\\\\/g, "\\")
          .trim();
      }

      function escapeRegExp(value) {
        return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function normalizeResult(data) {
        const normalized = {
          summary: {
            text: pickText(data?.summary?.text, "本次结果没有生成概要内容。"),
            originalChapters: pickText(data?.summary?.originalChapters, "未明确对应章节"),
            sourceType: normalizeSourceType(data?.summary?.sourceType),
            confidence: normalizeConfidence(data?.summary?.confidence)
          },
          coreConflict: normalizeArray(data?.coreConflict).map((item) => ({
            point: pickText(item?.point, "未明确说明"),
            sourceType: normalizeSourceType(item?.sourceType),
            confidence: normalizeConfidence(item?.confidence)
          })),
          confusingPoints: normalizeArray(data?.confusingPoints).map((item) => ({
            question: pickText(item?.question, "未命名问题"),
            answer: pickText(item?.answer, "暂无解答"),
            relatedEpisode: pickText(item?.relatedEpisode, ""),
            sourceType: normalizeSourceType(item?.sourceType),
            spoilerLevel: normalizeSpoiler(item?.spoilerLevel),
            confidence: normalizeConfidence(item?.confidence)
          })),
          scenes: normalizeArray(data?.scenes).map((item) => ({
            title: pickText(item?.title, "未命名场景"),
            description: pickText(item?.description, "暂无说明"),
            characters: normalizeArray(item?.characters).map((char) => pickText(char, "")).filter(Boolean),
            significance: pickText(item?.significance, "暂无说明"),
            sourceType: normalizeSourceType(item?.sourceType),
            confidence: normalizeConfidence(item?.confidence)
          })),
          characters: normalizeArray(data?.characters).map((item) => ({
            name: pickText(item?.name, "未命名角色"),
            identity: pickText(item?.identity, "暂无说明"),
            thisEpisode: pickText(item?.thisEpisode, "暂无说明"),
            relationChanges: pickText(item?.relationChanges, ""),
            isNew: Boolean(item?.isNew),
            sourceType: normalizeSourceType(item?.sourceType),
            confidence: normalizeConfidence(item?.confidence)
          })),
          highlights: normalizeArray(data?.highlights).map((item) => ({
            quote: pickText(item?.quote, "暂无台词或场景描述"),
            speaker: pickText(item?.speaker, "未知说话人"),
            context: pickText(item?.context, "背景未说明"),
            deeperMeaning: pickText(item?.deeperMeaning, ""),
            spoilerLevel: normalizeSpoiler(item?.spoilerLevel),
            sourceType: normalizeSourceType(item?.sourceType),
            confidence: normalizeConfidence(item?.confidence)
          })),
          spoilers: {
            warning: pickText(data?.spoilers?.warning, "以下内容包含原著剧透"),
            foreshadowing: normalizeArray(data?.spoilers?.foreshadowing).map((item) => ({
              hint: pickText(item?.hint, "未命名伏笔"),
              futurePayoff: pickText(item?.futurePayoff, "后续兑现方式未说明"),
              sourceType: normalizeSourceType(item?.sourceType, "原著补充"),
              confidence: normalizeConfidence(item?.confidence)
            })),
            futureDirection: {
              text: pickText(data?.spoilers?.futureDirection?.text, ""),
              sourceType: normalizeSourceType(data?.spoilers?.futureDirection?.sourceType, "原著补充"),
              confidence: normalizeConfidence(data?.spoilers?.futureDirection?.confidence)
            },
            characterFates: {
              text: pickText(data?.spoilers?.characterFates?.text, ""),
              sourceType: normalizeSourceType(data?.spoilers?.characterFates?.sourceType, "原著补充"),
              confidence: normalizeConfidence(data?.spoilers?.characterFates?.confidence)
            },
            adaptationDifferences: {
              text: pickText(data?.spoilers?.adaptationDifferences?.text, ""),
              sourceType: normalizeSourceType(data?.spoilers?.adaptationDifferences?.sourceType, "原著补充"),
              confidence: normalizeConfidence(data?.spoilers?.adaptationDifferences?.confidence)
            }
          }
        };

        return normalized;
      }

      function collectSourceTypes(data) {
        const sources = new Set();
        const touch = (value) => {
          if (value && SOURCE_LABELS[value]) {
            sources.add(value);
          }
        };

        touch(data.summary.sourceType);
        data.coreConflict.forEach((item) => touch(item.sourceType));
        data.confusingPoints.forEach((item) => touch(item.sourceType));
        data.scenes.forEach((item) => touch(item.sourceType));
        data.characters.forEach((item) => touch(item.sourceType));
        data.highlights.forEach((item) => touch(item.sourceType));
        data.spoilers.foreshadowing.forEach((item) => touch(item.sourceType));
        touch(data.spoilers.futureDirection.sourceType);
        touch(data.spoilers.characterFates.sourceType);
        touch(data.spoilers.adaptationDifferences.sourceType);

        if (!sources.size) {
          sources.add("动画直接内容");
        }

        return Array.from(sources).map((item) => item === "动画直接内容" ? "动画内容" : item);
      }

      function startLoadingTicker() {
        stopLoadingTicker();
        state.loadingMessageIndex = 0;
        state.loadingTicker = window.setInterval(() => {
          state.loadingMessageIndex = (state.loadingMessageIndex + 1) % CONFIG.loadMessages.length;
          if (state.loading) {
            const node = document.getElementById("loadingMessage");
            if (node) {
              node.textContent = CONFIG.loadMessages[state.loadingMessageIndex];
            }
          }
        }, 1700);
      }

      function stopLoadingTicker() {
        if (state.loadingTicker) {
          window.clearInterval(state.loadingTicker);
          state.loadingTicker = null;
        }
      }

      function abortCurrentRequest(message) {
        if (!state.activeController) {
          return;
        }
        state.requestToken += 1;
        window.clearTimeout(state.activeController.timeoutHandle);
        state.activeController.abort();
        state.activeController = null;
        if (message) {
          pushToast(message, "success");
        }
      }

      function resetModuleOpen() {
        state.moduleOpen = {
          summary: true,
          coreConflict: true,
          confusingPoints: true,
          scenes: true,
          characters: false,
          highlights: false,
          spoilers: state.currentMode === "deep_spoiler"
        };
      }

      function getVisibleEpisodes(season) {
        const query = normalizeSearchText(state.episodeQuery);
        const arcMeta = getCurrentArcFilterMeta(season);
        return season.episodes.filter((episode) => {
          if (episode.status !== "available") {
            return false;
          }
          if (state.episodeFilter === "cached" && !hasCacheForEpisode(season.name, episode.num)) {
            return false;
          }
          if (state.episodeFilter === "latest" && !episode.isLatest) {
            return false;
          }
          if (state.episodeFilter === "current_arc" && arcMeta && episode.arc !== arcMeta.arc) {
            return false;
          }
          if (!query) {
            return true;
          }
          return normalizeSearchText([
            episode.num,
            episode.shortTitle,
            episode.arc,
            episode.focus,
            episode.tags.join(" ")
          ].join(" ")).includes(query);
        });
      }

      function getCurrentArcFilterMeta(season) {
        const selected = getSelectedEpisodeMeta();
        if (!selected || selected.seasonName !== season.name || !selected.arc) {
          return null;
        }
        return {
          arc: selected.arc,
          count: season.episodes.filter((episode) => episode.arc === selected.arc).length
        };
      }

      function flattenEpisodes() {
        return EPISODE_DATA.seasons.flatMap((season) =>
          season.episodes
            .filter((episode) => episode.status === "available")
            .map((episode) => ({
              ...episode,
              seasonIndex: season.index,
              seasonName: season.name,
              fullTitle: `${season.name}·第${episode.num}集《${episode.shortTitle}》`
            }))
        );
      }

      function getLatestAvailableEpisode() {
        const all = flattenEpisodes();
        return all.length ? all[all.length - 1] : null;
      }

      function getSelectedEpisodeMeta() {
        if (!state.selectedEpisodeNum) {
          return null;
        }
        const season = EPISODE_DATA.seasons[state.selectedSeasonIndex];
        const episode = season?.episodes.find((item) => item.num === state.selectedEpisodeNum);
        if (!episode) {
          return null;
        }
        return {
          ...episode,
          seasonName: season.name,
          fullTitle: `${season.name}·第${episode.num}集《${episode.shortTitle}》`
        };
      }

      function getAdjacentEpisodes(seasonIndex, episodeNum) {
        const all = flattenEpisodes();
        const currentIndex = all.findIndex((item) => item.seasonIndex === seasonIndex && item.num === episodeNum);
        return {
          prev: currentIndex > 0 ? all[currentIndex - 1] : null,
          next: currentIndex >= 0 && currentIndex < all.length - 1 ? all[currentIndex + 1] : null
        };
      }

      function getCoverageText() {
        const firstSeason = EPISODE_DATA.seasons[0];
        const latest = getLatestAvailableEpisode();
        return latest
          ? `已收录 ${firstSeason.name}·第1集 至 ${latest.seasonName}·第${latest.num}集（截至 ${EPISODE_DATA.updatedAsOf} 已播）`
          : "暂无已收录剧集";
      }

      function getRecentEpisodeText() {
        const recent = state.recentEpisode || safeStorage.getJSON(STORAGE_KEYS.lastEpisode, null);
        if (!recent) {
          return "";
        }
        return `上次查看：${escapeHTML(recent.seasonName)}·第${recent.episodeNum}集 <button class="recent-link" data-action="continue-last">继续查看</button>`;
      }

      function getSelectionLabel() {
        const selection = getCurrentSelection();
        return selection ? `${selection.seasonName}·第${selection.episodeNum}集` : "未选择剧集";
      }

      function getCurrentSelection() {
        if (!state.selectedEpisodeNum) {
          return null;
        }
        const season = EPISODE_DATA.seasons[state.selectedSeasonIndex];
        const episode = season.episodes.find((item) => item.num === state.selectedEpisodeNum);
        return {
          seasonIndex: season.index,
          seasonName: season.name,
          seasonTheme: season.theme,
          episodeNum: state.selectedEpisodeNum,
          shortTitle: episode?.shortTitle || `第${state.selectedEpisodeNum}集`,
          arc: episode?.arc || "",
          tags: episode?.tags || [],
          focus: episode?.focus || ""
        };
      }

      function getModeLabel(mode) {
        const found = MODE_OPTIONS.find((item) => item.id === mode);
        return found ? found.label : "看懂前后因果";
      }

      function getModelGroupLabel(model) {
        const found = MODEL_GROUPS.find((group) => group.models.includes(model));
        return found ? found.label : "自定义模型";
      }

      function getModelGuidance(model) {
        const value = String(model || "").toLowerCase();
        if (value.includes("claude")) {
          return "Anthropic 这一类通常更适合长段落说明和人物关系梳理，稳定性较好，但成本往往更高。";
        }
        if (value.includes("gemini") || value.includes("flash")) {
          return "Google 这一类更偏速度和性价比，适合频繁重生成功能调试，但长文细节偶尔会更松。";
        }
        if (value.includes("gpt")) {
          return "OpenAI 这一类通常在格式遵循和整体均衡上更稳，适合你想兼顾结构和可读性的场景。";
        }
        if (value.includes("grok")) {
          return "xAI 这一类更适合你想试不同表达风格时切换使用，正式长文前建议先做一轮检测。";
        }
        if (value.includes("qwen")) {
          return "Qwen 这一类更适合追求速度和成本控制，想高频重试时会比较友好。";
        }
        if (value.includes("deepseek")) {
          return "DeepSeek 这一类性价比较高，做剧情拆解通常够用，但不同时间段稳定性可能会有波动。";
        }
        if (value.includes("openrouter/auto")) {
          return "OpenRouter 自动路由适合你还没想清楚具体模型时先跑起来，但同一轮前后结果可能不完全一致。";
        }
        return "自定义模型建议先点一次“检测可用性”，确认当前通道和返回格式都正常，再正式生成解析。";
      }

      function getChannelSummary() {
        const hasOpenRouter = Boolean(readSetting(STORAGE_KEYS.apiKey, "").trim());
        const hasDeepSeek = Boolean(readSetting(STORAGE_KEYS.deepseekKey, "").trim());
        if (hasOpenRouter && hasDeepSeek) {
          return "当前策略：优先走 OpenRouter 主通道；如果当前模型受地区或账号限制，会先自动回退到 openrouter/auto；再失败才切到 DeepSeek 备用通道。";
        }
        if (hasOpenRouter) {
          return "当前策略：优先使用你选定的 OpenRouter 模型；如果该模型当前不可用，会自动回退到 openrouter/auto。你可以切换更多模型，但没有 DeepSeek 备用通道兜底。";
        }
        if (hasDeepSeek) {
          return "当前策略：未配置 OpenRouter，页面会直接使用 DeepSeek 备用通道。能用，但模型选择空间会更小。";
        }
        return "当前还没有可用通道。先填 OpenRouter 或 DeepSeek Key，主页面才能真正生成解析结果。";
      }

      function getModeShortFocus(mode) {
        if (mode === "focus_current") {
          return "尽量只讲本集信息，不主动展开重剧透。";
        }
        if (mode === "deep_spoiler") {
          return "允许深挖后续命运与改编差异。";
        }
        return "重点梳理人物关系、前情和后续因果。";
      }

      function getReadingScaleLabel(scale) {
        const found = READING_SCALES.find((item) => item.id === scale);
        return found ? found.label : "标准";
      }

      function setFeedback(channel, message, type) {
        state.feedback[channel] = message;
        state.feedback[`${channel}Type`] = type;
      }

      function setSettingsFeedback(message, type) {
        state.feedback.settings = message;
        state.feedback.settingsType = type;
      }

      function pushToast(message, type) {
        const id = `${Date.now()}_${Math.random().toString(16).slice(2)}`;
        state.toasts.push({ id, message, type });
        renderToasts();
        window.setTimeout(() => {
          state.toasts = state.toasts.filter((item) => item.id !== id);
          renderToasts();
        }, 2800);
      }

      function renderToasts() {
        toastStack.innerHTML = state.toasts.map((toast) => `
          <div class="toast ${toast.type || ""}">${escapeHTML(toast.message)}</div>
        `).join("");
      }

      function humanizeError(error) {
        if (isAbortLike(error)) {
          return error?.wasTimeout || error?.name === "TimeoutError" ? "请求超时，本次解析内容较长，建议稍后重试。" : "用户手动取消了本次请求。";
        }
        if (error && typeof error.message === "string") {
          return error.message;
        }
        return "请求失败，请检查网络、Key 与模型配置后重试。";
      }

      function isAbortLike(error) {
        return error?.name === "AbortError" || error?.wasTimeout;
      }

      function resolveApiError(provider, status, responseText) {
        const detail = parseErrorDetail(responseText);
        if (provider === "OpenRouter" && isModelAvailabilityDetail(detail)) {
          return `OpenRouter 当前所选模型在你当前地区、账号或路由条件下不可用，不代表 API Key 本身无效。${detail ? ` ${detail}` : ""}`;
        }
        if (status === 400) {
          return `${provider} 请求参数不完整或格式不正确，请检查模型与请求内容。${detail ? ` ${detail}` : ""}`;
        }
        if (status === 401 || status === 403) {
          return `${provider} Key 无效或权限不足，请重新检查 API Key。${detail ? ` ${detail}` : ""}`;
        }
        if (status === 404) {
          return `${provider} 返回模型不存在或暂不可用，请更换模型后重试。${detail ? ` ${detail}` : ""}`;
        }
        if (status === 408 || status === 504) {
          return `${provider} 请求超时，请检查网络或稍后再试。`;
        }
        if (status === 429) {
          return `${provider} 当前请求过于频繁或额度不足，请稍后再试。${detail ? ` ${detail}` : ""}`;
        }
        if (status >= 500) {
          return `${provider} 服务端暂时不可用，请稍后再试。${detail ? ` ${detail}` : ""}`;
        }
        return `${provider} 请求失败。${detail || "请检查网络和配置后重试。"}`;
      }

      function parseErrorDetail(text) {
        if (!text) {
          return "";
        }
        try {
          const data = JSON.parse(text);
          return data?.error?.message || data?.message || "";
        } catch (error) {
          return String(text).slice(0, 120);
        }
      }

      function shouldRetryWithOpenRouterAuto(model, error) {
        if (!model || String(model).toLowerCase() === "openrouter/auto") {
          return false;
        }
        const message = String(error?.message || "");
        return isModelAvailabilityDetail(message);
      }

      function isModelAvailabilityDetail(detail) {
        const text = String(detail || "").toLowerCase();
        if (!text) {
          return false;
        }
        return [
          "not available in your region",
          "model is not available",
          "provider returned no endpoints",
          "no endpoints found",
          "temporarily unavailable",
          "region",
          "unsupported country",
          "not available to the current user",
          "model not found for this account"
        ].some((pattern) => text.includes(pattern));
      }

      function pickContentFromResponse(text) {
        try {
          const data = JSON.parse(text);
          return data?.choices?.[0]?.message?.content || "";
        } catch (error) {
          return text;
        }
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/\s+/g, "")
          .trim();
      }

      function isTypingContext(target) {
        if (!target) {
          return false;
        }
        const tag = target.tagName;
        return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || target.isContentEditable;
      }

      function readSetting(key, fallback) {
        const value = safeStorage.get(key);
        return value == null || value === "" ? fallback : value;
      }

      function sanitizeModel(model) {
        return String(model || "unknown")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "")
          .slice(0, 48) || "model";
      }

      function normalizeArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function pickText(value, fallback) {
        if (typeof value === "string" && value.trim()) {
          return value.trim();
        }
        return fallback;
      }

      function normalizeSourceType(value, fallback = "推断") {
        if (value === "动画直接内容" || value === "原著补充" || value === "推断") {
          return value;
        }
        return fallback;
      }

      function normalizeConfidence(value) {
        if (value === "high" || value === "medium" || value === "low") {
          return value;
        }
        return "medium";
      }

      function normalizeSpoiler(value) {
        if (value === "none" || value === "light" || value === "heavy") {
          return value;
        }
        return "light";
      }

      function renderSourceTag(sourceType) {
        const cls = sourceType === "动画直接内容"
          ? "source-animation"
          : sourceType === "原著补充"
            ? "source-novel"
            : "source-infer";
        return `<span class="tag ${cls}">来源：${escapeHTML(sourceType)}</span>`;
      }

      function renderConfidenceTag(confidence) {
        return `<span class="tag">${escapeHTML(CONFIDENCE_LABELS[confidence] || "可信度：中")}</span>`;
      }

      function getAvatarText(name) {
        const clean = String(name || "").trim();
        return clean ? clean[0] : "人";
      }

      function maskStatus(value) {
        return value ? "已配置" : "未配置";
      }

      function formatDateTime(timestamp) {
        if (!timestamp) {
          return "暂无";
        }
        try {
          return new Intl.DateTimeFormat("zh-CN", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          }).format(new Date(timestamp));
        } catch (error) {
          return new Date(timestamp).toLocaleString();
        }
      }

      function buildFullCopyText(data) {
        if (!data) {
          return "";
        }
        const selected = getSelectedEpisodeMeta();
        return [
          `【${selected ? selected.fullTitle : getSelectionLabel()}】`,
          buildSummaryCopy(data.summary),
          buildCoreConflictCopy(data.coreConflict),
          buildConfusingCopy(data.confusingPoints),
          buildScenesCopy(data.scenes),
          buildCharactersCopy(data.characters),
          buildHighlightsCopy(data.highlights),
          buildSpoilersCopy(data.spoilers)
        ].filter(Boolean).join("\n\n");
      }

      function buildSummaryCopy(summary) {
        return [
          "【本集概要】",
          summary.text,
          `对应原著章节：${summary.originalChapters}`,
          `来源：${summary.sourceType} / ${CONFIDENCE_LABELS[summary.confidence] || "可信度：中"}`
        ].join("\n");
      }

      function buildCoreConflictCopy(items) {
        return [
          "【本集核心矛盾】",
          ...(items.length ? items.map((item, index) => `${index + 1}. ${item.point}（${item.sourceType} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}）`) : ["暂无"])
        ].join("\n");
      }

      function buildConfusingCopy(items) {
        return [
          "【你可能没看懂的地方】",
          ...(items.length ? items.map((item, index) => `${index + 1}. ${item.question}\n${item.answer}\n关联集数：${item.relatedEpisode || "无"} / 来源：${item.sourceType} / ${SPOILER_LABELS[item.spoilerLevel] || "轻剧透"} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}`) : ["暂无"])
        ].join("\n");
      }

      function buildScenesCopy(items) {
        return [
          "【剧情详细拆解】",
          ...(items.length ? items.map((item, index) => `${index + 1}. ${item.title}\n发生了什么：${item.description}\n涉及角色：${item.characters.join("、") || "未说明"}\n为什么重要：${item.significance}\n来源：${item.sourceType} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}`) : ["暂无"])
        ].join("\n");
      }

      function buildCharactersCopy(items) {
        return [
          "【角色关系梳理】",
          ...(items.length ? items.map((item, index) => `${index + 1}. ${item.name}${item.isNew ? "（本集新登场）" : ""}\n身份：${item.identity}\n本集表现：${item.thisEpisode}\n关系变化：${item.relationChanges || "暂无明显变化"}\n来源：${item.sourceType} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}`) : ["暂无"])
        ].join("\n");
      }

      function buildHighlightsCopy(items) {
        return [
          "【本集名场面 / 金句】",
          ...(items.length ? items.map((item, index) => `${index + 1}. ${item.quote}\n说话人：${item.speaker}\n场景背景：${item.context}\n更深含义：${item.deeperMeaning || "未补充"}\n来源：${item.sourceType} / ${SPOILER_LABELS[item.spoilerLevel] || "轻剧透"} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}`) : ["暂无"])
        ].join("\n");
      }

      function buildSpoilersCopy(spoilers) {
        const lines = ["【伏笔与后续（剧透）】", spoilers.warning || "以下内容包含原著剧透", ""];
        lines.push("本集埋下的伏笔：");
        if (spoilers.foreshadowing.length) {
          spoilers.foreshadowing.forEach((item, index) => {
            lines.push(`${index + 1}. ${item.hint}`);
            lines.push(`后续兑现：${item.futurePayoff}`);
            lines.push(`来源：${item.sourceType} / ${CONFIDENCE_LABELS[item.confidence] || "可信度：中"}`);
          });
        } else {
          lines.push("暂无");
        }
        lines.push("");
        lines.push(`当前剧情线后续走向：${spoilers.futureDirection.text || "暂无"}`);
        lines.push(`角色命运走向：${spoilers.characterFates.text || "暂无"}`);
        lines.push(`动画与原著的差异：${spoilers.adaptationDifferences.text || "暂无"}`);
        return lines.join("\n");
      }

      function renderScrollIllustration() {
        return `
          <svg class="state-illustration float" viewBox="0 0 280 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="54" y="44" width="172" height="94" rx="16" fill="rgba(232,224,212,0.06)" stroke="rgba(201,169,110,0.46)"/>
            <path d="M62 60C84 44 110 40 140 40C170 40 196 44 218 60" stroke="rgba(201,169,110,0.55)" stroke-width="2"/>
            <path d="M62 122C84 138 110 142 140 142C170 142 196 138 218 122" stroke="rgba(91,140,122,0.52)" stroke-width="2"/>
            <path d="M84 76H196" stroke="rgba(232,224,212,0.24)" stroke-width="2" stroke-linecap="round"/>
            <path d="M84 92H186" stroke="rgba(232,224,212,0.18)" stroke-width="2" stroke-linecap="round"/>
            <path d="M84 108H172" stroke="rgba(232,224,212,0.14)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="48" cy="91" r="18" fill="rgba(91,140,122,0.18)" stroke="rgba(91,140,122,0.55)"/>
            <circle cx="232" cy="91" r="18" fill="rgba(201,169,110,0.14)" stroke="rgba(201,169,110,0.55)"/>
          </svg>
        `;
      }

      function renderBookIllustration() {
        return `
          <svg class="state-illustration" viewBox="0 0 320 210" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path class="float" d="M46 144L132 72C140 66 152 66 160 72L274 152" stroke="rgba(201,169,110,0.66)" stroke-width="3" stroke-linecap="round"/>
            <path d="M44 144V64C44 55 50 48 59 48H135C145 48 153 56 153 66V164C153 156 146 150 138 150H59C50 150 44 153 44 144Z" fill="rgba(232,224,212,0.06)" stroke="rgba(232,224,212,0.18)"/>
            <path d="M276 144V64C276 55 270 48 261 48H185C175 48 167 56 167 66V164C167 156 174 150 182 150H261C270 150 276 153 276 144Z" fill="rgba(91,140,122,0.08)" stroke="rgba(91,140,122,0.28)"/>
            <path class="pulse" d="M72 76H126M72 94H126M72 112H116" stroke="rgba(232,224,212,0.26)" stroke-width="3" stroke-linecap="round"/>
            <path class="pulse" d="M194 76H248M194 94H248M194 112H236" stroke="rgba(232,224,212,0.22)" stroke-width="3" stroke-linecap="round"/>
          </svg>
        `;
      }

      function renderMistIllustration() {
        return `
          <svg class="state-illustration" viewBox="0 0 280 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M28 124C64 94 96 110 126 90C162 66 198 68 252 108" stroke="rgba(201,169,110,0.4)" stroke-width="3" stroke-linecap="round"/>
            <path d="M34 140C68 122 104 126 142 116C178 108 214 114 248 132" stroke="rgba(232,224,212,0.2)" stroke-width="3" stroke-linecap="round"/>
            <circle cx="142" cy="64" r="22" fill="rgba(139,58,58,0.18)" stroke="rgba(139,58,58,0.48)"/>
            <path d="M140 52V78M127 65H153" stroke="rgba(243,209,209,0.78)" stroke-width="3" stroke-linecap="round"/>
          </svg>
        `;
      }

      function escapeHTML(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttribute(value) {
        return escapeHTML(value).replace(/`/g, "&#96;");
      }

    })();
  </script>
